name: Lint

on:
  pull_request:
    branches: ["*"]
  push:
    branches: [main]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: docker://markdownlint/markdownlint:latest
        with:
          args: --style /github/workspace/.mdl-style.rb .
